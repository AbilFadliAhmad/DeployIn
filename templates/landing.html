<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Datang - Deployin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<!-- Latar belakang gradient penuh warna -->
<body class="relative min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 overflow-hidden font-sans flex items-center justify-center">

    <!-- Elemen Desain Geometris Latar Belakang -->
    <div class="absolute top-10 left-10 w-72 h-72 bg-blue-400 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-pulse"></div>
    <div class="absolute bottom-10 right-20 w-96 h-96 bg-yellow-400 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-pulse" style="animation-delay: 2s;"></div>

    <!-- Bentuk Kotak & Segitiga Abstrak -->
    <div class="absolute top-1/4 right-1/4 w-32 h-32 bg-white/20 backdrop-blur-sm transform rotate-45 border border-white/30 rounded-lg"></div>
    <div class="absolute bottom-1/4 left-1/4 w-48 h-48 bg-pink-400/30 backdrop-blur-md transform -rotate-12 rounded-[2rem] border border-white/20"></div>

    <!-- Konten Utama (Glassmorphism Card) -->
    <div class="relative z-10 w-full max-w-lg p-10 bg-white/10 backdrop-blur-lg rounded-3xl shadow-2xl border border-white/20 text-center">

        <div class="mb-6 inline-block bg-white/20 p-4 rounded-2xl shadow-inner transform -rotate-6">
            <span class="text-6xl">🚀</span>
        </div>

        <h1 class="text-5xl font-extrabold text-white mb-4 tracking-tight drop-shadow-md">
            Deployin.
        </h1>
        <p class="text-lg text-white/90 mb-8 leading-relaxed font-medium">
            Sistem orkestrasi deployment otomatis dari GitHub ke VPS Anda.
            Tanpa ribet, tanpa batas, tentukan teknologimu sendiri.
        </p>

        <div class="flex flex-col space-y-4">
            <a href="/login" class="w-full bg-white text-purple-700 font-bold text-lg py-4 rounded-xl shadow-lg hover:bg-gray-100 hover:scale-105 transition transform duration-200">
                Masuk (Login) Sekarang
            </a>
            <div class="text-white/70 text-sm mt-4">
                Aplikasi internal eksklusif. Hubungi administrator untuk mendapatkan akses.
            </div>
        </div>
    </div>

</body>
</html>
