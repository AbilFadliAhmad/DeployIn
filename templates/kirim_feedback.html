<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirim Feedback - Deployin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col justify-between text-gray-800">

    <main class="container mx-auto px-6 py-12 max-w-xl">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <div class="flex items-center space-x-3 mb-6">
                <span class="text-3xl">💡</span>
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">Lapor Bug & Saran</h1>
                    <p class="text-xs text-gray-500">Masukan Anda membantu kami mengembangkan Deployin</p>
                </div>
            </div>

            <form action="/kirim-feedback" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700">Jenis Laporan</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="border-2 border-gray-200 rounded-xl p-4 flex items-center space-x-3 cursor-pointer hover:border-blue-500 transition has-[:checked]:border-blue-600 has-[:checked]:bg-blue-50">
                            <input type="radio" name="jenis" value="bug" class="w-4 h-4 text-blue-600" checked>
                            <span class="font-medium text-sm text-gray-700">🪲 Lapor Bug / Error</span>
                        </label>
                        <label class="border-2 border-gray-200 rounded-xl p-4 flex items-center space-x-3 cursor-pointer hover:border-blue-500 transition has-[:checked]:border-blue-600 has-[:checked]:bg-blue-50">
                            <input type="radio" name="jenis" value="saran" class="w-4 h-4 text-blue-600">
                            <span class="font-medium text-sm text-gray-700">🚀 Saran Fitur</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700">Isi Pesan Detail</label>
                    <textarea name="pesan" rows="5" placeholder="Jelaskan secara rinci bug yang ditemukan atau fitur yang ingin Anda ajukan..." class="w-full border border-gray-300 px-4 py-3 rounded-xl focus:ring-2 focus:ring-blue-500 bg-gray-50 text-sm" required></textarea>
                </div>

                <div class="flex space-x-3 pt-2">
                    <a href="/dashboard" class="w-1/3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 rounded-xl text-center transition text-sm">
                        Batal
                    </a>
                    <button type="submit" class="w-2/3 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition text-sm">
                        Kirim Masukan
                    </button>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
